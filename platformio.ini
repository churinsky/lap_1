[env:megaatmega2560]
platform    = atmelavr
board       = megaatmega2560
framework   = arduino
lib_deps    =
  smougenot/TM1637@0.0.0-alpha+sha.9486982048
  adafruit/RTClib@^1.14.1

upload_protocol = usbasp
upload_flags =
	-Pusb
	-B10

; Igual que arriba, pero con EESAVE activado
board_fuses.lfuse = 0xF7
board_fuses.hfuse = 0xD7   ; BOOTRST=1, SPIEN=0, EESAVE=0 (preserva)
board_fuses.efuse = 0xFD
board_fuses.lock  = 0xFF

targets = fuses, upload
;pio run -e megaatmega2560 -t fuses
;pio run -e megaatmega2560 -t upload